<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>TO-DO LIST</title>
  </head>
  <body>
    <header id="greeting">
      <h2>
        What's up,
        <input class="name-input" type="text" placeholder="name here" />
      </h2>
      <div class="search-part">
        <input type="text" id="search-label" placeholder="Task Name.." />
        <i class="fa-solid fa-magnifying-glass icon"></i>
      </div>
    </header>
    <main>
      <form action="#" id="todo-form">
        <h2>Create a to-do</h2>
        <div class="todo-details">
          <h3>What's on your to do?</h3>
          <input
            class="todo-input"
            type="text"
            placeholder="e.g. study lesson"
          />
          <input
            class="todo-input"
            type="text"
            placeholder="Task description"
          />
          <label for="imageInput" class="image-label">
            Drop a Photo
            <input
              type="file"
              name="userImage"
              id="imageInput"
              accept="image/*"
            />
          </label>
        </div>
        <div class="priority">
          <h3>To-Do Priority</h3>
          <label>
            <input type="radio" name="priority" value="low" />
            Low
          </label>
          <label>
            <input type="radio" name="priority" value="Medium" />
            medium
          </label>
          <label>
            <input type="radio" name="priority" value="Hard" />
            hard
          </label>
        </div>
        <button type="submit">ADD TODO</button>
      </form>
      <section id="todo-lists">
        <h3>todo lists</h3>
        <div id="hold">
          <h4>To Do</h4>
          <div class="todo">
            <img src="path/to/image.jpg" alt="Task Image" />
            <input type="checkbox" />
            <p>task</p>
            <p>Task Description</p>
            <span>Priority: High</span>
            <button>edit</button>
            <button>delete</button>
          </div>
        </div>
        <div id="inprogress">
          <h4>In Progress</h4>
        </div>
        <div id="done">
          <h4>Done</h4>
        </div>
      </section>
    </main>
  </body>
</html>
