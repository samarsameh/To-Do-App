<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css"
      integrity="sha512-DxV+EoADOkOygM4IR9yXP8Sb2qwgidEmeqAEmDKIOfPRQZOWbXCzLC6vjbZyy0vPisbH2SyW27+ddLVCN+OMzQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>TO-DO LIST</title>
  </head>
  <body>
    <header id="greeting">
      <h2>
        What's up,
        <input class="name-input" type="text" placeholder="name here" />
      </h2>
      <div class="search-part">
        <input type="text" id="search-label" placeholder="Task Name.." />
        <i class="fa-solid fa-magnifying-glass icon"></i>
      </div>
    </header>
    <main>
      <form action="#" id="todo-form">
        <h3>Create a to-do</h3>
        <div class="todo-details">
          <h4>What's on your to do?</h4>
          <input
            class="todo-input"
            type="text"
            placeholder="e.g. study lesson"
          />
          <input
            class="todo-input"
            type="text"
            placeholder="Task description"
          />
          <label for="imageInput" class="image-label">
            Drop a Photo
            <input
              type="file"
              name="userImage"
              id="imageInput"
              accept="image/*"
            />
          </label>
        </div>
        <div class="todo-priority">
          <h4>To-Do Priority</h4>
          <label class="priority">
            <input type="radio" name="priority" value="low" />
            <span class="bubble low"></span>
            Low
          </label>
          <label class="priority">
            <input type="radio" name="priority" value="Medium" />
            <span class="bubble medium"></span>
            medium
          </label>
          <label class="priority">
            <input type="radio" name="priority" value="Hard" />
            <span class="bubble hard"></span>
            hard
          </label>
        </div>
        <button class="submit" type="submit">ADD TODO</button>
      </form>
      <section id="todo-lists">
        <h3>todo lists</h3>
        <div class="tasks-cards">
          <div id="hold">
            <div class="status">
              <h4>To do</h4>
              <p>1</p>
            </div>
            <div class="todo" draggable="true">
              <img src="path/to/image.jpg" alt="Task Image" />
              <div class="todo-content">
                <div class="todo-header">
                  <p>task</p>
                  <input type="checkbox" />
                </div>
                <p>Task Description</p>
                <div class="todo-footer">
                  <span>High</span>
                  <div class="todo-actions">
                    <button><i class="fa-regular fa-pen-to-square"></i></button>
                    <button><i class="fa-regular fa-trash-can"></i></button>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="inprogress">
            <div class="status">
              <h4>In Progress</h4>
              <p>1</p>
            </div>
          </div>
          <div id="done">
            <div class="status">
              <h4>Done</h4>
              <p>1</p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
